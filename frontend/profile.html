<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Profile - Knowledge Platform</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <script>if(localStorage.getItem('theme')==='dark'||(!('theme'in localStorage)&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark');else document.documentElement.classList.remove('dark');</script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "var(--primary)",
                        "primary-hover": "var(--primary-hover)",
                        "surface": "var(--bg-surface)",
                        "border": "var(--border)",
                        "text-main": "var(--text-main)",
                        "text-muted": "var(--text-muted)",
                        "bg-card": "var(--bg-card)",
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-text-main font-['Inter'] antialiased selection:bg-primary/20 selection:text-primary dark:bg-slate-950 dark:text-slate-100 min-h-screen flex items-center justify-center p-8">

    <div class="w-full max-w-2xl">
        <!-- Header -->
        <div class="flex items-center gap-4 mb-8">
            <button onclick="goBack()" class="w-12 h-12 rounded-xl bg-white dark:bg-slate-900 border border-border shadow-sm flex items-center justify-center hover:bg-gray-50 dark:hover:bg-slate-800 transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div>
                <h1 class="text-3xl font-black tracking-tight">Your Profile</h1>
                <p class="text-text-muted">Manage your personal information and preferences.</p>
            </div>
        </div>

        <!-- Card -->
        <div class="bg-white dark:bg-slate-900 rounded-3xl border border-border shadow-2xl p-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-primary to-purple-500"></div>
            
            <form id="profileForm" onsubmit="handleSave(event)" class="space-y-6">
                <!-- Avatar Section -->
                <div class="flex items-center gap-6 pb-6 border-b border-border">
                    <div class="relative group">
                        <div class="w-24 h-24 rounded-2xl bg-primary/10 text-primary flex items-center justify-center text-4xl font-black overflow-hidden border-2 border-primary/20" id="avatarPreviewContainer">
                            <span id="initialsText">U</span>
                            <img id="avatarImage" src="" class="w-full h-full object-cover hidden" alt="Profile Picture">
                        </div>
                        <label class="absolute inset-0 bg-slate-900/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity rounded-2xl cursor-pointer backdrop-blur-sm">
                            <span class="material-symbols-outlined text-white">photo_camera</span>
                            <input type="file" id="profilePicInput" name="profile_pic" accept="image/*" class="hidden" onchange="previewImage(this)">
                        </label>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg">Profile Picture</h3>
                        <p class="text-sm text-text-muted mb-2">Upload a professional headshot.</p>
                        <p class="text-xs font-medium text-primary">JPG, GIF or PNG. Max size of 5MB.</p>
                    </div>
                </div>

                <!-- Form Fields -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-text-muted uppercase tracking-widest mb-2">Full Name</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-3 text-text-muted">person</span>
                            <input type="text" id="fullName" name="full_name" required class="w-full bg-surface dark:bg-slate-800 border-border rounded-xl pl-12 pr-4 py-3 focus:ring-2 focus:ring-primary focus:border-primary transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-text-muted uppercase tracking-widest mb-2">Email Address</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-3 text-text-muted">mail</span>
                            <input type="email" id="emailField" name="email" readonly class="w-full bg-gray-100 dark:bg-slate-800/50 text-text-muted border-border rounded-xl pl-12 pr-4 py-3 cursor-not-allowed">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-text-muted uppercase tracking-widest mb-2">Phone Number</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-3 text-text-muted">phone</span>
                            <input type="tel" id="phoneField" name="phone" placeholder="+1 (555) 000-0000" class="w-full bg-surface dark:bg-slate-800 border-border rounded-xl pl-12 pr-4 py-3 focus:ring-2 focus:ring-primary focus:border-primary transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-text-muted uppercase tracking-widest mb-2">Role</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-3 text-text-muted">badge</span>
                            <input type="text" id="roleField" readonly class="w-full bg-gray-100 dark:bg-slate-800/50 text-text-muted border-border rounded-xl pl-12 pr-4 py-3 capitalize cursor-not-allowed">
                        </div>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-text-muted uppercase tracking-widest mb-2">Address</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-3 text-text-muted">location_on</span>
                            <textarea id="addressField" name="address" rows="3" placeholder="Enter your full address" class="w-full bg-surface dark:bg-slate-800 border-border rounded-xl pl-12 pr-4 py-3 focus:ring-2 focus:ring-primary focus:border-primary transition-all"></textarea>
                        </div>
                    </div>
                </div>

                <div class="pt-6 border-t border-border flex justify-end">
                    <button type="submit" id="saveBtn" class="bg-primary hover:bg-primary-hover text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">save</span>
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-8 right-8 bg-slate-900 text-white px-6 py-4 rounded-xl shadow-2xl transform transition-all duration-300 translate-x-[150%] flex items-center gap-3 z-50">
        <span class="material-symbols-outlined" id="toastIcon">info</span>
        <span class="font-medium" id="toastMsg">Message</span>
    </div>

    <script>
        const email = localStorage.getItem('email');
        if (!email) window.location.href = 'login.html';

        // Dark mode already initialized in <head>

        function goBack() {
            const role = localStorage.getItem('role');
            if (role === 'admin') window.location.href = 'admin.html';
            else window.location.href = 'user.html';
        }

        function showToast(msg, type='info') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            const icon = document.getElementById('toastIcon');
            if(type === 'error') { icon.innerText = 'error'; toast.className = "fixed top-8 right-8 bg-red-500 text-white px-6 py-4 rounded-xl shadow-2xl transform transition-all duration-300 flex items-center gap-3 z-50"; }
            else if(type === 'success') { icon.innerText = 'check_circle'; toast.className = "fixed top-8 right-8 bg-emerald-500 text-white px-6 py-4 rounded-xl shadow-2xl transform transition-all duration-300 flex items-center gap-3 z-50"; }
            else { icon.innerText = 'info'; toast.className = "fixed top-8 right-8 bg-slate-900 text-white px-6 py-4 rounded-xl shadow-2xl transform transition-all duration-300 flex items-center gap-3 z-50"; }
            
            setTimeout(() => toast.style.transform = "translateX(150%)", 3000);
        }

        async function loadProfile() {
            try {
                const res = await fetch(`/profile/${encodeURIComponent(email)}`);
                if (!res.ok) throw new Error('Failed to load profile');
                const data = await res.json();
                
                document.getElementById('emailField').value = data.email;
                document.getElementById('fullName').value = data.full_name;
                document.getElementById('phoneField').value = data.phone;
                document.getElementById('roleField').value = data.role;
                document.getElementById('addressField').value = data.address;
                
                document.getElementById('initialsText').innerText = data.full_name ? data.full_name[0].toUpperCase() : data.email[0].toUpperCase();
                
                if (data.profile_pic) {
                    const img = document.getElementById('avatarImage');
                    img.src = '/profiles/' + data.profile_pic;
                    img.classList.remove('hidden');
                    document.getElementById('initialsText').classList.add('hidden');
                    localStorage.setItem('profile_pic', data.profile_pic);
                }
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('avatarImage');
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                    document.getElementById('initialsText').classList.add('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function handleSave(e) {
            e.preventDefault();
            const form = document.getElementById('profileForm');
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Saving...';
            btn.disabled = true;

            const formData = new FormData(form);
            
            try {
                const res = await fetch('/profile', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                if (res.ok) {
                    showToast(data.msg, 'success');
                    if (data.profile_pic) {
                        localStorage.setItem('profile_pic', data.profile_pic);
                    }
                    localStorage.setItem('name', document.getElementById('fullName').value);
                } else {
                    showToast(data.detail || 'Failed to save', 'error');
                }
            } catch (err) {
                showToast('Connection error', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        loadProfile();
    </script>
</body>
</html>
