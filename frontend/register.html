<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join | Enterprise Brain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script>if(localStorage.getItem('theme')==='dark'||(!('theme'in localStorage)&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark');else document.documentElement.classList.remove('dark');</script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "var(--primary)",
                        "primary-hover": "var(--primary-hover)",
                        "text-main": "var(--text-main)",
                        "text-muted": "var(--text-muted)",
                        "border": "var(--border)",
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-text-main min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Background Decor -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px] -z-10"></div>
    <div class="absolute bottom-[10%] right-[-10%] w-[40%] h-[40%] bg-accent/10 rounded-full blur-[120px] -z-10"></div>
    
    <div class="max-w-md w-full">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 glass rounded-[2rem] mb-6 shadow-2xl border-white/20">
                <span class="material-symbols-outlined gradient-text text-4xl font-bold">person_add</span>
            </div>
            <h1 class="text-4xl font-black tracking-tight mb-3">Create Account</h1>
            <p class="text-text-muted text-lg">Join your corporate knowledge ecosystem.</p>
        </div>

        <div class="card p-8 shadow-2xl glass border-white/10">
            <form id="registerForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-black uppercase tracking-widest text-text-muted">Full Name</label>
                    <input type="text" id="fullname" placeholder="Alex Rivers" required
                           class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-border rounded-xl outline-none focus:border-primary transition-all font-medium">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black uppercase tracking-widest text-text-muted">Corporate Email</label>
                    <input type="email" id="email" placeholder="alex@company.com" required
                           class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-border rounded-xl outline-none focus:border-primary transition-all font-medium">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black uppercase tracking-widest text-text-muted">Role Selection</label>
                    <select id="role" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-border rounded-xl outline-none focus:border-primary transition-all font-medium">
                        <option value="employee">Employee</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black uppercase tracking-widest text-text-muted">Security Key</label>
                    <input type="password" id="password" placeholder="••••••••" required
                           class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-border rounded-xl outline-none focus:border-primary transition-all font-medium">
                </div>

                <button type="submit" class="w-full bg-primary text-white py-4 rounded-xl font-bold hover:bg-primary-hover shadow-lg shadow-indigo-500/20 transition-all">Establish Identity</button>
            </form>

            <div class="mt-8 pt-8 border-t border-border text-center">
                <p class="text-xs text-text-muted">Already have an identity? <a href="login.html" class="font-bold text-primary hover:underline">Sign in here</a></p>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        const form = document.getElementById('registerForm');

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'check_circle' : (type === 'error' ? 'error' : 'info');
            toast.innerHTML = `<span class="material-symbols-outlined">${icon}</span><span class="text-sm font-medium">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name: fullName, email, role, password })
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('Identity established! Redirecting to login...', 'success');
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    showToast(data.detail || 'Registration failed', 'error');
                }
            } catch (err) {
                showToast('Server connection failed', 'error');
            }
        };
    </script>
</body>
</html>
